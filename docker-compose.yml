services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: webhook_relay
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://relay:changeme@db:5432/webhook_relay
    ports:
      - "8001:8000"

volumes:
  pgdata:
